training:
    lr: 3e-4
    wd: 0.0
    n_epochs: 15
    smooth: 0.15
    save_all_epochs: False
    precision: fp16
    batch_size: 64    
    gpu: 0
    n_training: 100000
    n_validation: 5000
    n_pixel: 64
    latent: None

unet_flow:
    in_channels: 77
    out_channels: 77 
    model_channels: 64
    num_res_blocks: 2
    attention_resolutions: [4, 8]
    dropout: 0.0
    channel_mult: [1, 2, 4]
    conv_resample: True
    dims: 2
    use_checkpoint: False    
    num_heads: 4
    num_head_channels: -1
    num_heads_upsample: -1
    use_scale_shift_norm: True
    resblock_updown: True
    use_new_attention_order: False

unet_stokes:
    in_channels: 448
    out_channels: 77 
    model_channels: 64 
    channel_mult: [1, 2, 4]
    is_attn: [False, False, False, False]
    n_blocks: 1
